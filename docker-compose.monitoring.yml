version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: events_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=events_db
    networks:
      - events_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: events_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - events_network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: events_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - events_network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: events_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - events_network

  # WebUI для мониторинга
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: events_webui
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DB_NAME=events_db
      - DEBUG=true
    depends_on:
      - mongodb
    command: uvicorn src.webui.app:create_web_app --factory --host 0.0.0.0 --port 8080 --reload
    networks:
      - events_network

volumes:
  mongodb_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  events_network:
    driver: bridge
